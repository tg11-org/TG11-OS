set timeout=5
set default=0

menuentry "TG11 OS" {
    set gfxpayload=text
    multiboot2 /boot/kernel.elf display=vga
    boot
}

menuentry "TG11 OS (framebuffer)" {
	set gfxpayload=1024x768x32
	multiboot2 /boot/kernel-fb.elf display=fb
	boot
}

menuentry "TG11 OS (framebuffer 1280x720)" {
	set gfxpayload=1280x720x32
	multiboot2 /boot/kernel-fb.elf display=fb
	boot
}

menuentry "TG11 OS (framebuffer 1280x1024)" {
	set gfxpayload=1280x1024x32
	multiboot2 /boot/kernel-fb.elf display=fb
	boot
}

menuentry "TG11 OS (framebuffer 1600x900)" {
	set gfxpayload=1600x900x32
	multiboot2 /boot/kernel-fb.elf display=fb
	boot
}

menuentry "TG11 OS (framebuffer 1920x1080)" {
	set gfxpayload=1920x1080x32
	multiboot2 /boot/kernel-fb.elf display=fb
	boot
}